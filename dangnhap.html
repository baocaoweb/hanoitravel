<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập | Hanoi Travel</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="auth-page">
      <div class="auth-card">
        <h2>Đăng nhập</h2>
        <p>Vui lòng nhập email và mật khẩu để tiếp tục.</p>

        <form id="loginForm">
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input
              type="email"
              id="loginEmail"
              placeholder="Nhập email của bạn"
              required
            />
          </div>
          <div class="form-group">
            <label for="loginPassword">Mật khẩu</label>
            <input
              type="password"
              id="loginPassword"
              placeholder="Nhập mật khẩu"
              required
            />
          </div>
          <div class="auth-action">
            <a href="dangky.html">Chưa có tài khoản? Đăng ký</a>
          </div>
          <button type="submit">Đăng nhập</button>
          <div id="loginMessage" class="auth-message"></div>
        </form>
      </div>
    </section>

    <script>
      const loginForm = document.getElementById("loginForm");
      const loginMessage = document.getElementById("loginMessage");

      function showMessage(message, type) {
        loginMessage.textContent = message;
        loginMessage.className = "auth-message " + type;
        loginMessage.style.display = "block";
      }

      loginForm.addEventListener("submit", function (event) {
        event.preventDefault();

        const email = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value.trim();

        if (!email || !password) {
          showMessage("Vui lòng nhập đầy đủ email và mật khẩu.", "error");
          return;
        }

        localStorage.setItem("isLoggedIn", "true");
        showMessage("Đăng nhập thành công! Chuyển đến trang chủ...", "success");

        setTimeout(function () {
          window.location.href = "index.html";
        }, 1100);
      });

      const authButton = document.getElementById("authButton");

      function refreshAuthButton() {
        if (!authButton) {
          return;
        }

        const loggedIn = localStorage.getItem("isLoggedIn") === "true";

        if (loggedIn) {
          authButton.textContent = "Đăng xuất";
          authButton.href = "#";
          authButton.onclick = function (event) {
            event.preventDefault();
            localStorage.removeItem("isLoggedIn");
            location.reload();
          };
        } else {
          authButton.textContent = "Đăng nhập";
          authButton.href = "dangnhap.html";
          authButton.onclick = null;
        }
      }

      refreshAuthButton();
    </script>
  </body>
</html>
