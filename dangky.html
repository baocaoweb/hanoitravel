<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký | Hanoi Travel</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="auth-page">
      <div class="auth-card">
        <h2>Đăng ký</h2>
        <p>Tạo tài khoản mới để khám phá trang.</p>

        <form id="registerForm">
          <div class="form-group">
            <label for="registerName">Họ và tên</label>
            <input
              type="text"
              id="registerName"
              placeholder="Nhập họ và tên"
              required
            />
          </div>
          <div class="form-group">
            <label for="registerEmail">Email</label>
            <input
              type="email"
              id="registerEmail"
              placeholder="Nhập email"
              required
            />
          </div>
          <div class="form-group">
            <label for="registerPassword">Mật khẩu</label>
            <input
              type="password"
              id="registerPassword"
              placeholder="Nhập mật khẩu"
              required
            />
          </div>
          <div class="form-group">
            <label for="registerConfirmPassword">Xác nhận mật khẩu</label>
            <input
              type="password"
              id="registerConfirmPassword"
              placeholder="Nhập lại mật khẩu"
              required
            />
          </div>
          <div class="auth-action">
            <a href="dangnhap.html">Đã có tài khoản? Đăng nhập</a>
          </div>
          <button type="submit">Đăng ký</button>
          <div id="registerMessage" class="auth-message"></div>
        </form>
      </div>
    </section>

    <script>
      const registerForm = document.getElementById("registerForm");
      const registerMessage = document.getElementById("registerMessage");

      function showRegisterMessage(message, type) {
        registerMessage.textContent = message;
        registerMessage.className = "auth-message " + type;
        registerMessage.style.display = "block";
      }

      registerForm.addEventListener("submit", function (event) {
        event.preventDefault();

        const name = document.getElementById("registerName").value.trim();
        const email = document.getElementById("registerEmail").value.trim();
        const password = document
          .getElementById("registerPassword")
          .value.trim();
        const confirmPassword = document
          .getElementById("registerConfirmPassword")
          .value.trim();

        if (!name || !email || !password || !confirmPassword) {
          showRegisterMessage("Vui lòng điền đầy đủ thông tin.", "error");
          return;
        }

        if (password !== confirmPassword) {
          showRegisterMessage(
            "Mật khẩu và xác nhận mật khẩu không khớp.",
            "error",
          );
          return;
        }

        localStorage.setItem("isLoggedIn", "true");
        showRegisterMessage(
          "Đăng ký thành công! Chuyển đến trang chủ...",
          "success",
        );

        setTimeout(function () {
          window.location.href = "index.html";
        }, 1100);
      });

      const authButton = document.getElementById("authButton");

      function refreshAuthButton() {
        if (!authButton) {
          return;
        }

        const loggedIn = localStorage.getItem("isLoggedIn") === "true";

        if (loggedIn) {
          authButton.textContent = "Đăng xuất";
          authButton.href = "#";
          authButton.onclick = function (event) {
            event.preventDefault();
            localStorage.removeItem("isLoggedIn");
            location.reload();
          };
        } else {
          authButton.textContent = "Đăng nhập";
          authButton.href = "dangnhap.html";
          authButton.onclick = null;
        }
      }

      refreshAuthButton();
    </script>
  </body>
</html>
